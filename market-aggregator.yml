name: KO-Scanner Market Aggregator

on:
  # Täglich um 22:15 UTC (nach US-Schluss 16:15 ET = 22:15 UTC)
  schedule:
    - cron: '15 22 * * 1-5'   # Mo-Fr 22:15 UTC

  # Manueller Trigger (für Tests)
  workflow_dispatch:
    inputs:
      debug:
        description: 'Debug-Modus (mehr Logs)'
        required: false
        default: 'false'
        type: boolean

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Repository checkout ────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python Setup ───────────────────────────────────────────────────
      - name: Python 3.11 Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Dependencies ───────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance requests numpy pandas

      # ── 4. Aggregator ausführen ───────────────────────────────────────────
      - name: Run Market Aggregator
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
          CF_KV_NS_ID:   ${{ secrets.CF_KV_NS_ID }}
        run: |
          python market_aggregator.py

      # ── 5. Ergebnis als Artefakt speichern (7 Tage) ───────────────────────
      - name: Upload master_market_data.json as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: master-market-data-${{ github.run_number }}
          path: master_market_data.json
          retention-days: 7

      # ── 6. Status-Summary ─────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          if [ -f master_market_data.json ]; then
            SIZE=$(du -h master_market_data.json | cut -f1)
            TICKERS=$(python3 -c "import json; d=json.load(open('master_market_data.json')); print(d['meta']['total'])")
            ERRORS=$(python3 -c "import json; d=json.load(open('master_market_data.json')); print(d['meta']['errors'])")
            ELAPSED=$(python3 -c "import json; d=json.load(open('master_market_data.json')); print(d['meta']['elapsed_s'])")
            echo "## KO-Scanner Aggregator Ergebnis" >> $GITHUB_STEP_SUMMARY
            echo "| Metrik | Wert |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
            echo "| Dateigröße | $SIZE |" >> $GITHUB_STEP_SUMMARY
            echo "| Ticker OK | $TICKERS |" >> $GITHUB_STEP_SUMMARY
            echo "| Fehler | $ERRORS |" >> $GITHUB_STEP_SUMMARY
            echo "| Laufzeit | ${ELAPSED}s |" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ master_market_data.json wurde nicht erstellt" >> $GITHUB_STEP_SUMMARY
          fi
