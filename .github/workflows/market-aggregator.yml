name: KO-Scanner Market Aggregator

on:
  schedule:
    # v4.4 (03.07.2026): 03:37 statt 04:00 — GitHub-Schedules zur vollen Stunde
    # verzögern regelmäßig um Stunden (02.07.: 3h23min); unrunde Minute + früherer
    # Start puffern das ab. Datenreferenz ist IMMER der letzte Handelstag
    # (get_last_trading_day() via SPY — feiertags-robust), NICHT der Wochentag;
    # Läufe ohne neuen Handelstag sind harmlos (TR-Layer dedupliziert).
    - cron: '37 03 * * 1-6'
  workflow_dispatch:

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11 Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance requests numpy pandas

      - name: Clear yfinance cache
        run: rm -rf ~/.cache/py-yfinance/ || true

      - name: Run Market Aggregator
        env:
          CF_ACCOUNT_ID:      ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN:       ${{ secrets.CF_API_TOKEN }}
          CF_KV_NS_ID:        ${{ secrets.CF_KV_NS_ID }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONUNBUFFERED:   "1"
        run: |
          python market_aggregator.py
          echo "Exit Code: $?"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: master-market-data-${{ github.run_number }}
          path: master_market_data.json
          retention-days: 7
