name: KO-Scanner Market Aggregator

on:
  schedule:
    - cron: '00 04 * * 2-6'   # Di-Sa 04:00 UTC (nach Mo-Fr US After-Hours)
    - cron: '00 04 * * 1'     # Mo 04:00 UTC (nach Freitag After-Hours)
  workflow_dispatch:

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11 Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance requests numpy pandas

      - name: Clear yfinance cache
        run: rm -rf ~/.cache/py-yfinance/ || true

      - name: Run Market Aggregator
        env:
          CF_ACCOUNT_ID:      ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN:       ${{ secrets.CF_API_TOKEN }}
          CF_KV_NS_ID:        ${{ secrets.CF_KV_NS_ID }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONUNBUFFERED:   "1"
        run: |
          python market_aggregator.py
          echo "Exit Code: $?"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: master-market-data-${{ github.run_number }}
          path: master_market_data.json
          retention-days: 7
